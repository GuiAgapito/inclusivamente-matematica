<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InclusivaMente Matemática - Dezena, Centena & Unidade</title>
    <link rel="shortcut icon" href="../../assets/matematica.png">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        transition: background-color 0.3s ease;
      }

      body.dark {
        background-color: #0a0a2a;
      }
      body.light {
        background-color: #d4d8e8;
      }

      /* PAINEL DE CONTROLE */
      .controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 15px 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 12px;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.2);
        pointer-events: auto;
        transition: all 0.3s ease;
      }

      body.dark .controls {
        background: rgba(20, 20, 35, 0.95);
      }
      body.light .controls {
        background: rgba(240, 242, 255, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.15);
      }

      button {
        padding: 10px 24px;
        font-weight: bold;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        transition:
          transform 0.1s,
          all 0.2s;
        font-size: 14px;
      }
      button:active {
        transform: scale(0.96);
      }

      .btn-unidade {
        background: #ffd700;
        color: #1a1a2a;
      }
      .btn-dezena {
        background: #4caf50;
        color: white;
      }
      .btn-centena {
        background: #2196f3;
        color: white;
      }
      .btn-milhar {
        background: #9c27b0;
        color: white;
      }
      .btn-todos {
        background: #ff9800;
        color: white;
      }
      .tema-btn {
        background: #00bcd4;
        color: white;
      }

      body.light .btn-unidade {
        background: #b8860b;
        color: white;
      }
      body.light .tema-btn {
        background: #0097a7;
      }

      .info-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 12px 20px;
        z-index: 100;
        border-left: 4px solid #ffd700;
        pointer-events: none;
        font-family: "Courier New", monospace;
      }

      body.dark .info-panel {
        background: rgba(0, 0, 0, 0.7);
        color: white;
      }
      body.light .info-panel {
        background: rgba(255, 255, 255, 0.9);
        color: #1a1a2a;
      }

      .info-panel h1 {
        margin: 0 0 5px 0;
        font-size: 18px;
      }

      .info-panel p {
        margin: 0;
        font-size: 12px;
        opacity: 0.8;
      }

      .status {
        position: absolute;
        top: 20px;
        right: 20px;
        backdrop-filter: blur(8px);
        padding: 8px 18px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: bold;
        z-index: 100;
        pointer-events: none;
        font-family: monospace;
      }

      body.dark .status {
        background: rgba(0, 0, 0, 0.7);
        color: #ffd700;
      }
      body.light .status {
        background: rgba(255, 255, 255, 0.8);
        color: #b8860b;
      }

      @media (max-width: 700px) {
        button {
          padding: 6px 12px;
          font-size: 11px;
        }
        .info-panel {
          display: none;
        }
        .status {
          font-size: 10px;
          top: 10px;
          right: 10px;
        }
        .controls {
          bottom: 10px;
          left: 10px;
          right: 10px;
          padding: 10px;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body class="dark">
    <div class="info-panel">
      <h1>🧮 Material Dourado 3D</h1>
      <p>Unidade 🟡 | Dezena 🟢 | Centena 🔵 | Milhar 🟣</p>
    </div>
    <div class="status" id="statusText">🔆 Visualizando: TODAS AS PEÇAS</div>

    <div class="controls">
      <button id="btnUnidade" class="btn-unidade">🟡 UNIDADE</button>
      <button id="btnDezena" class="btn-dezena">🟢 DEZENA</button>
      <button id="btnCentena" class="btn-centena">🔵 CENTENA</button>
      <button id="btnMilhar" class="btn-milhar">🟣 MILHAR</button>
      <button id="btnTodos" class="btn-todos">🌟 TODAS JUNTAS</button>
      <button id="btnTema" class="tema-btn">🌓 TEMA</button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // --- CONFIGURAÇÕES GLOBAIS ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a2a);
      scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(8, 6, 12);
      camera.lookAt(0, 2, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = false;
      controls.enableZoom = true;
      controls.enablePan = true;
      controls.target.set(0, 2, 0);
      controls.zoomSpeed = 1.0;

      // --- ILUMINAÇÃO (MANTIDA IGUAL) ---
      const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
      mainLight.position.set(5, 10, 7);
      mainLight.castShadow = true;
      mainLight.shadow.mapSize.width = 1024;
      mainLight.shadow.mapSize.height = 1024;
      mainLight.shadow.camera.near = 0.5;
      mainLight.shadow.camera.far = 20;
      mainLight.shadow.camera.left = -6;
      mainLight.shadow.camera.right = 6;
      mainLight.shadow.camera.top = 6;
      mainLight.shadow.camera.bottom = -6;
      scene.add(mainLight);

      const fillLight = new THREE.PointLight(0x5588cc, 0.35);
      fillLight.position.set(-3, 3, 5);
      scene.add(fillLight);

      const rimLight = new THREE.PointLight(0xffaa66, 0.25);
      rimLight.position.set(2, 3, -5);
      scene.add(rimLight);

      const backLight = new THREE.PointLight(0xffaa88, 0.2);
      backLight.position.set(0, 2, -6);
      scene.add(backLight);

      // --- CHÃO E GRADE ---
      const chao = new THREE.Mesh(
        new THREE.PlaneGeometry(14, 12),
        new THREE.MeshStandardMaterial({
          color: 0x1a1a2e,
          roughness: 0.7,
          metalness: 0.05,
        }),
      );
      chao.rotation.x = -Math.PI / 2;
      chao.position.y = -0.2;
      chao.receiveShadow = true;
      scene.add(chao);

      const gridHelper = new THREE.GridHelper(16, 20, 0x88aaff, 0x335588);
      gridHelper.position.y = -0.15;
      scene.add(gridHelper);

      // --- PARÂMETROS DE CONSTRUÇÃO ---
      const CUBE_SIZE = 0.45;

      const COR_UNIDADE = 0xffd700;
      const COR_DEZENA = 0x4caf50;
      const COR_CENTENA = 0x2196f3;
      const COR_MILHAR = 0x9c27b0;

      const materialUnidade = new THREE.MeshStandardMaterial({
        color: COR_UNIDADE,
        roughness: 0.2,
        metalness: 0.05,
      });
      const materialDezena = new THREE.MeshStandardMaterial({
        color: COR_DEZENA,
        roughness: 0.2,
      });
      const materialCentena = new THREE.MeshStandardMaterial({
        color: COR_CENTENA,
        roughness: 0.2,
      });
      const materialMilhar = new THREE.MeshStandardMaterial({
        color: COR_MILHAR,
        roughness: 0.2,
      });

      const meshMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });

      // FUNÇÕES DE CRIAÇÃO DAS PEÇAS

      function criarUnidade(x, z, yBase = 0.2) {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
        const cube = new THREE.Mesh(geometry, materialUnidade.clone());
        cube.castShadow = true;
        cube.position.y = CUBE_SIZE / 2;
        group.add(cube);

        const edges = new THREE.EdgesGeometry(geometry);
        const wire = new THREE.LineSegments(edges, meshMaterial);
        wire.position.y = CUBE_SIZE / 2;
        group.add(wire);

        group.position.set(x, yBase, z);
        return group;
      }

      function criarDezena(x, z, yBase = 0.2) {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

        for (let i = 0; i < 10; i++) {
          const cube = new THREE.Mesh(geometry, materialDezena.clone());
          cube.position.y = i * CUBE_SIZE + CUBE_SIZE / 2;
          cube.castShadow = true;
          group.add(cube);

          const edges = new THREE.EdgesGeometry(geometry);
          const wire = new THREE.LineSegments(edges, meshMaterial);
          wire.position.y = i * CUBE_SIZE + CUBE_SIZE / 2;
          group.add(wire);
        }
        group.position.set(x, yBase, z);
        return group;
      }

      function criarCentena(x, z, yBase = 0.2) {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

        for (let i = 0; i < 10; i++) {
          for (let j = 0; j < 10; j++) {
            const posX = (j - 4.5) * CUBE_SIZE;
            const posY = i * CUBE_SIZE + CUBE_SIZE / 2;

            const cube = new THREE.Mesh(geometry, materialCentena.clone());
            cube.position.set(posX, posY, 0);
            cube.castShadow = true;
            group.add(cube);

            const edges = new THREE.EdgesGeometry(geometry);
            const wire = new THREE.LineSegments(edges, meshMaterial);
            wire.position.set(posX, posY, 0);
            group.add(wire);
          }
        }
        group.position.set(x, yBase, z);
        return group;
      }

      function criarMilhar(x, z, yBase = 0.2) {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

        for (let k = 0; k < 10; k++) {
          for (let i = 0; i < 10; i++) {
            for (let j = 0; j < 10; j++) {
              const posX = (j - 4.5) * CUBE_SIZE;
              const posY = i * CUBE_SIZE + CUBE_SIZE / 2;
              const posZ = (k - 4.5) * CUBE_SIZE;

              const cube = new THREE.Mesh(geometry, materialMilhar.clone());
              cube.position.set(posX, posY, posZ);
              cube.castShadow = true;
              group.add(cube);

              const edges = new THREE.EdgesGeometry(geometry);
              const wire = new THREE.LineSegments(edges, meshMaterial);
              wire.position.set(posX, posY, posZ);
              group.add(wire);
            }
          }
        }
        group.position.set(x, yBase, z);
        return group;
      }

      // GERENCIAMENTO DE VISUALIZAÇÃO
      let grupoUnidades = new THREE.Group();
      let grupoDezenas = new THREE.Group();
      let grupoCentenas = new THREE.Group();
      let grupoMilhares = new THREE.Group();

      scene.add(grupoUnidades, grupoDezenas, grupoCentenas, grupoMilhares);

      let modoAtual = "todos"; // 'unidade', 'dezena', 'centena', 'milhar', 'todos'

      // Posições centralizadas para cada peça quando única
      const posicaoCentral = { x: 0, z: 0 };

      // Posições para o modo "todos juntos"
      const posUnidade = { x: -3.5, z: -1.5 };
      const posDezena = { x: 0, z: -1.5 };
      const posCentena = { x: 3.5, z: -1.5 };
      const posMilhar = { x: 0, z: 2.5 };

      function atualizarVisualizacao() {
        // Limpar grupos
        while (grupoUnidades.children.length)
          grupoUnidades.remove(grupoUnidades.children[0]);
        while (grupoDezenas.children.length)
          grupoDezenas.remove(grupoDezenas.children[0]);
        while (grupoCentenas.children.length)
          grupoCentenas.remove(grupoCentenas.children[0]);
        while (grupoMilhares.children.length)
          grupoMilhares.remove(grupoMilhares.children[0]);

        const statusDiv = document.getElementById("statusText");

        if (modoAtual === "unidade") {
          grupoUnidades.add(
            criarUnidade(posicaoCentral.x, posicaoCentral.z, 0.25),
          );
          statusDiv.innerHTML = "🟡 Visualizando: UNIDADE";
          statusDiv.style.color = "#FFD700";
          controls.target.set(0, 0.5, 0);
        } else if (modoAtual === "dezena") {
          grupoDezenas.add(
            criarDezena(posicaoCentral.x, posicaoCentral.z, 0.25),
          );
          statusDiv.innerHTML = "🟢 Visualizando: DEZENA";
          statusDiv.style.color = "#4CAF50";
          controls.target.set(0, 2.5, 0);
        } else if (modoAtual === "centena") {
          grupoCentenas.add(
            criarCentena(posicaoCentral.x, posicaoCentral.z, 0.25),
          );
          statusDiv.innerHTML = "🔵 Visualizando: CENTENA";
          statusDiv.style.color = "#2196F3";
          controls.target.set(0, 2.5, 0);
        } else if (modoAtual === "milhar") {
          grupoMilhares.add(
            criarMilhar(posicaoCentral.x, posicaoCentral.z, 0.25),
          );
          statusDiv.innerHTML = "🟣 Visualizando: MILHAR";
          statusDiv.style.color = "#CE93D8";
          controls.target.set(0, 2.5, 0);
        } else {
          // 'todos'
          grupoUnidades.add(criarUnidade(posUnidade.x, posUnidade.z, 0.25));
          grupoDezenas.add(criarDezena(posDezena.x, posDezena.z, 0.25));
          grupoCentenas.add(criarCentena(posCentena.x, posCentena.z, 0.25));
          grupoMilhares.add(criarMilhar(posMilhar.x, posMilhar.z, 0.25));
          statusDiv.innerHTML = "🌟 Visualizando: TODAS AS PEÇAS JUNTAS";
          statusDiv.style.color = "#FF9800";
          controls.target.set(0, 2, 0);
        }
      }

      // TEMA CLARO/ESCURO
      let temaAtual = "dark";
      function alternarTema() {
        const body = document.body;
        if (temaAtual === "dark") {
          body.classList.remove("dark");
          body.classList.add("light");
          scene.background.setHex(0xd4d8e8);
          scene.fog.color.setHex(0xd4d8e8);
          chao.material.color.setHex(0xe0e0e8);
          gridHelper.material.color.setHex(0x666666);
          temaAtual = "light";
        } else {
          body.classList.remove("light");
          body.classList.add("dark");
          scene.background.setHex(0x0a0a2a);
          scene.fog.color.setHex(0x0a0a2a);
          chao.material.color.setHex(0x1a1a2e);
          gridHelper.material.color.setHex(0x88aaff);
          temaAtual = "dark";
        }
      }

      // EVENTOS DOS BOTÕES
      document.getElementById("btnUnidade").onclick = () => {
        modoAtual = "unidade";
        atualizarVisualizacao();
      };
      document.getElementById("btnDezena").onclick = () => {
        modoAtual = "dezena";
        atualizarVisualizacao();
      };
      document.getElementById("btnCentena").onclick = () => {
        modoAtual = "centena";
        atualizarVisualizacao();
      };
      document.getElementById("btnMilhar").onclick = () => {
        modoAtual = "milhar";
        atualizarVisualizacao();
      };
      document.getElementById("btnTodos").onclick = () => {
        modoAtual = "todos";
        atualizarVisualizacao();
      };
      document.getElementById("btnTema").onclick = alternarTema;

      // ANIMAÇÃO
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Inicializar
      atualizarVisualizacao();
      console.log("🚀 Material Dourado - Visualizador 3D carregado!");
      console.log(
        "💡 Clique nos botões para ver cada peça individualmente ou todas juntas!",
      );
    </script>
  </body>
</html>
